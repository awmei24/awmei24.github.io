<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect to index.html, encoding the path as a query param so the app can restore it
      const path = window.location.pathname;
      window.location.replace('/?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
